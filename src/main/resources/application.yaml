spring:
  application:
    name: baozi-store-api
  datasource:
    url: jdbc:mariadb://localhost:3306/db_local
    username: root
    password: root
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect
    open-in-view: false

server:
  port: 8080
